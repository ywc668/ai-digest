# AI Research Digest v2.1 Configuration
# ──────────────────────────────────────────────
# Cost target: < $3 per run (~$1 typical)
# Rate limit: respects 50 req/min API limit

# ── Interest Profile ──────────────────────────
interest_profile: |
  I am a software engineer focused on cloud infrastructure, Kubernetes, and DevOps,
  transitioning toward ML/AI infrastructure roles. My core interests are:

  HIGH PRIORITY:
  - LLM inference optimization (vLLM, TensorRT-LLM, SGLang, PagedAttention)
  - AI agent frameworks and agentic systems (MCP, LangGraph, tool use, multi-agent)
  - ML infrastructure and MLOps (Ray, model serving, GPU scheduling, training pipelines)
  - Distributed systems for AI (inference at scale, KV cache, speculative decoding)
  - Open-source AI models and releases (new model architectures, benchmarks, weights)

  MEDIUM PRIORITY:
  - Kubernetes and cloud-native infrastructure innovations
  - DevOps automation and AI-assisted development tools
  - Transformer architecture research and improvements
  - RLHF, alignment, and safety research
  - Retrieval-augmented generation (RAG) systems

  LOW PRIORITY (still interesting):
  - General AI industry news and company announcements
  - Programming language developments (Rust, Go, C++)
  - Hardware for AI (GPUs, TPUs, custom silicon)

# ── Scoring Settings ──────────────────────────
scoring:
  model: "claude-sonnet-4-20250514"

  # Rate limit protection (your API limit is 50 req/min, we use 40 with buffer)
  requests_per_minute: 40
  max_concurrent: 2       # Only 2 items scored in parallel

  # Progressive filtering thresholds
  stage1_threshold: 3     # Title-only screen: drop < 3
  stage2_threshold: 5     # Title+summary: this is min_score for digest
  stage3_threshold: 7     # Full analysis: only for score >= 7

  min_score: 5
  max_items: 15

# ── Dedup Settings ────────────────────────────
dedup:
  title_similarity_threshold: 0.7
  cross_source: true

# ── Feed Sources ──────────────────────────────
# TRIMMED for cost control. arXiv cs.AI+cs.LG combined can produce 200+
# items/day. We keep only cs.LG (ML, most relevant) and cs.CL (NLP).
# Add back cs.AI, cs.DC, cs.SE later once cost is validated.
feeds:
