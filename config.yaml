# AI Research Digest v2 Configuration
# ──────────────────────────────────────────────

# ── Interest Profile ──────────────────────────
# Natural language description scored by Claude.
# Be specific — the more precise, the better the filtering.
interest_profile: |
  I am a software engineer focused on cloud infrastructure, Kubernetes, and DevOps,
  transitioning toward ML/AI infrastructure roles. My core interests are:

  HIGH PRIORITY:
  - LLM inference optimization (vLLM, TensorRT-LLM, SGLang, PagedAttention)
  - AI agent frameworks and agentic systems (MCP, LangGraph, tool use, multi-agent)
  - ML infrastructure and MLOps (Ray, model serving, GPU scheduling, training pipelines)
  - Distributed systems for AI (inference at scale, KV cache, speculative decoding)
  - Open-source AI models and releases (new model architectures, benchmarks, weights)

  MEDIUM PRIORITY:
  - Kubernetes and cloud-native infrastructure innovations
  - DevOps automation and AI-assisted development tools
  - Transformer architecture research and improvements
  - RLHF, alignment, and safety research
  - Retrieval-augmented generation (RAG) systems

  LOW PRIORITY (still interesting):
  - General AI industry news and company announcements
  - Programming language developments (Rust, Go, C++)
  - Quantitative trading and financial ML
  - Hardware for AI (GPUs, TPUs, custom silicon)

# ── Scoring Settings ──────────────────────────
scoring:
  # Claude model for scoring
  model: "claude-sonnet-4-20250514"
  # Max concurrent scoring requests
  max_concurrent: 5

  # -- Progressive filtering (3-stage cascade) --
  # Stage 1: Title-only screen (cheap, filters ~60% of items)
  stage1_prompt: "title_only"
  stage1_threshold: 3      # items scoring < 3 on title alone are dropped
  # Stage 2: Title + summary scoring (moderate cost)
  stage2_threshold: 5      # items scoring < 5 are dropped
  # Stage 3: Full analysis for top candidates (only if summary score >= 7)
  stage3_threshold: 7      # triggers detailed analysis with full context
  # Final minimum score to include in digest
  min_score: 5
  # Maximum items per digest
  max_items: 15

# ── Deduplication Settings ────────────────────
dedup:
  # Similarity threshold for fuzzy title matching (0.0 - 1.0)
  title_similarity_threshold: 0.7
  # Enable cross-source dedup (same story on multiple outlets)
  cross_source: true

